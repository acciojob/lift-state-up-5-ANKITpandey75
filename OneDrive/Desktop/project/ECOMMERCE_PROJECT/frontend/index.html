<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Products</h1>
<div id="products"></div>

<script>
fetch('http://127.0.0.1:8000/api/products/')
.then(res => res.json())
.then(data => {
  data.forEach(p => {
    document.getElementById('products').innerHTML += `
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
    `
  })
})
</script>

</body>
</html>
