<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizQuest</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app-shell">
      <section id="home-screen" class="screen is-active" aria-labelledby="app-title">
        <div class="intro">
          <p class="eyebrow">Interactive quiz challenge</p>
          <h1 id="app-title">QuizQuest</h1>
          <p class="intro-copy">
            Choose a category, answer ten mixed-format questions, and get instant
            feedback after every move.
          </p>
        </div>

        <div class="stats-grid" aria-label="Quiz highlights">
          <div>
            <strong>4</strong>
            <span>Categories</span>
          </div>
          <div>
            <strong>40</strong>
            <span>Questions</span>
          </div>
          <div>
            <strong>3</strong>
            <span>Question types</span>
          </div>
        </div>

        <div id="category-grid" class="category-grid" aria-label="Quiz categories"></div>
      </section>

      <section id="quiz-screen" class="screen" aria-live="polite" aria-labelledby="question-title">
        <div class="quiz-topbar">
          <button id="back-button" class="ghost-button" type="button">Back</button>
          <div>
            <span id="category-label" class="category-label"></span>
            <h2 id="question-title">Question</h2>
          </div>
          <p id="score" class="score">0 / 0</p>
        </div>

        <div class="progress-shell" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <article class="question-panel">
          <p id="question-counter" class="question-counter"></p>
          <p id="question-text" class="question-text"></p>
          <form id="answer-form" class="answer-form"></form>
          <p id="feedback" class="feedback" role="status"></p>
          <div class="actions">
            <button id="check-button" class="primary-button" type="button">Check answer</button>
            <button id="next-button" class="primary-button" type="button" hidden>Next</button>
          </div>
        </article>
      </section>

      <section id="result-screen" class="screen result-screen" aria-labelledby="result-title">
        <p class="eyebrow">Quiz complete</p>
        <h2 id="result-title">Result</h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-message" class="result-message"></p>
        <div class="result-actions">
          <button id="retry-button" class="primary-button" type="button">Try again</button>
          <button id="home-button" class="ghost-button" type="button">Categories</button>
        </div>
      </section>
    </main>

    <noscript>This quiz needs JavaScript enabled to run.</noscript>
    <script src="script.js"></script>
  </body>
</html>
