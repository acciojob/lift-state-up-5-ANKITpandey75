<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Crypto Market Data</h1>

    <div class="controls">

        <input
            type="text"
            id="searchInput"
            placeholder="Search By Name or Symbol"
        >

        <button id="searchBtn">Search</button>

        <button id="marketCapBtn">
            Sort by Market Cap
        </button>

        <button id="percentageBtn">
            Sort by % Change
        </button>

    </div>

    <table>

        <thead>

            <tr>

                <th>Logo</th>
                <th>Name</th>
                <th>Symbol</th>
                <th>Current Price</th>
                <th>Total Volume</th>
                <th>Market Cap</th>
                <th>24h %</th>

            </tr>

        </thead>

        <tbody id="tableBody"></tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
