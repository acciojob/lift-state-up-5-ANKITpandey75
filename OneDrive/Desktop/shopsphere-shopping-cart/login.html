<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login | ShopSphere</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>

<body class="auth-page">
  <a
    class="brand auth-brand"
    href="index.html"
  >
    SHOP<span>SPHERE</span>
  </a>

  <main class="auth-wrap">
    <section class="auth-copy">
      <p class="eyebrow">WELCOME BACK</p>

      <h1>
        Your next favorite<br>
        find is waiting.
      </h1>

      <p>
        Sign in to continue shopping and pick up right where you left off.
      </p>
    </section>

    <form
      class="auth-card"
      id="loginForm"
    >
      <h2>Sign in</h2>

      <p class="muted">
        New here?
        <a href="signup.html">Create an account</a>
      </p>

      <label>
        Email
        <input
          type="email"
          id="loginEmail"
          placeholder="you@example.com"
          required
        >
      </label>

      <label>
        Password
        <input
          type="password"
          id="loginPassword"
          placeholder="Enter your password"
          required
        >
      </label>

      <p
        class="form-message"
        id="formMessage"
      ></p>

      <button
        class="btn dark full"
        type="submit"
      >
        Sign in →
      </button>
    </form>
  </main>

  <script src="js/app.js"></script>
</body>

</html>
